name: PR Checks
on:
  pull_request:
    branches:
      - main
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Node 🟢
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install, build and test 🔧
        run: |
          npm ci
          npm run build
          npm run test
